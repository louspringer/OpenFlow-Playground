apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "beast.fullname" . }}-agent
  labels:
    {{- include "beast.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.agents.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "beast.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "beast.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "beast.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: agent
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.agents.image.repository }}:{{ .Values.agents.image.tag }}"
        imagePullPolicy: {{ .Values.agents.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        {{- if .Values.healthCheck.enabled }}
        livenessProbe:
          {{- toYaml .Values.healthCheck.agent.livenessProbe | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.healthCheck.agent.readinessProbe | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.agents.resources | nindent 10 }}
        env:
          - name: BEAST_MODE
            value: "agent"
          - name: ORCHESTRATOR_ENDPOINT
            value: http://{{ include "beast.fullname" . }}-orchestrator:{{ .Values.service.orchestratorPort }}
          - name: LLM_ENDPOINT
            value: {{ .Values.config.llmEndpoint }}
          - name: EMBEDDINGS_ENDPOINT
            value: {{ .Values.config.embeddingsEndpoint }}
          - name: LOG_LEVEL
            value: {{ .Values.config.logLevel }}
          {{- if .Values.opentelemetry.enabled }}
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: {{ .Values.opentelemetry.endpoint }}
          - name: OTEL_SERVICE_NAME
            value: "beast-agent"
          - name: OTEL_TRACES_SAMPLER
            value: "always_on"
          {{- end }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

