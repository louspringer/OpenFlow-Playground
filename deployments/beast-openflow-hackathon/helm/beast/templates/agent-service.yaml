apiVersion: v1
kind: Service
metadata:
  name: {{ include "beast.fullname" . }}-agent
  labels:
    {{- include "beast.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.agentPort }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "beast.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: agent

