apiVersion: v1
kind: ServiceAccount
metadata:
  name: kiro-agent-sa
  namespace: default
  labels:
    app: kiro-agent
    platform: cloudrun
  annotations:
    iam.gke.io/gcp-service-account: kiro-agent-sa@aardvark-linkedin-grepper.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kiro-config
  namespace: default
  labels:
    app: kiro-agent
    platform: cloudrun
data:
  config.yaml: |
    platform: cloudrun
    environment: production
    timeout: 300
    max_requests: 1000
    log_level: INFO
    health_check_interval: 30
    metrics_enabled: true
    tracing_enabled: true
  app.properties: |
    # Kiro Agent Configuration for Cloud Run
    app.name=kiro-agent
    app.version=1.0.0
    app.platform=cloudrun
    app.environment=production
    
    # Performance settings
    server.port=8080
    server.timeout=300000
    server.max-connections=100
    
    # Logging
    logging.level=INFO
    logging.pattern=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
    
    # Health check
    health.check.enabled=true
    health.check.interval=30000
    health.check.timeout=5000
