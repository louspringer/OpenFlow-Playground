apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: kiro-agent
  namespace: default
  labels:
    app: kiro-agent
    platform: cloudrun
    environment: production
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      name: kiro-agent-v1
      labels:
        app: kiro-agent
        platform: cloudrun
        version: v1
      annotations:
        autoscaling.knative.dev/maxScale: "10"
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/target: "100"
        run.googleapis.com/cpu-throttling: "true"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/memory: "512Mi"
        run.googleapis.com/cpu: "1"
    spec:
      containerConcurrency: 100
      timeoutSeconds: 300
      containers:
      - name: kiro-agent-container
        image: gcr.io/aardvark-linkedin-grepper/kiro-agent:cloudrun
        ports:
        - name: http1
          containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "1"
          requests:
            memory: "256Mi"
            cpu: "0.5"
        env:
        - name: PLATFORM
          value: "cloudrun"
        - name: ENVIRONMENT
          value: "production"
        - name: K_SERVICE
          value: "kiro-agent"
        - name: K_REVISION
          value: "kiro-agent-v1"
        - name: PORT
          value: "8080"
        - name: GCP_PROJECT_ID
          value: "aardvark-linkedin-grepper"
        - name: LOG_LEVEL
          value: "INFO"
        # Health check configuration
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        # No persistent volumes - stateless only
        volumeMounts:
        - name: config-volume
          mountPath: /config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: kiro-config
      serviceAccountName: kiro-agent-sa
  traffic:
  - percent: 100
    latestRevision: true
