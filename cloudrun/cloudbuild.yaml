steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', 'gcr.io/$PROJECT_ID/kiro-agent:cloudrun',
      '-f', 'cloudrun/Dockerfile',
      '.'
    ]
  
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/kiro-agent:cloudrun']

images:
  - 'gcr.io/$PROJECT_ID/kiro-agent:cloudrun'
