# 🚀 Production Quality Gates Configuration
# Based on Meta-Testing Analysis Findings

quality_gates:
  # Meta-Testing Validation Gates
  meta_testing:
    required: true
    threshold: 100.0
    description: "Meta-cognitive orchestrator must pass all self-validation tests"
    tests:
      - recursive_testing_meta_case
      - multi_dimensional_orchestration_validation
      - blind_spot_detection_meta_testing
      - quality_system_meta_validation
      - self_referential_testing_capabilities
  
  # Core Quality Gates
  code_quality:
    required: true
    threshold: 100.0
    description: "All code quality checks must pass"
    checks:
      - flake8: 0 errors
      - black: 0 formatting issues
      - mypy: 0 type errors
      - bandit: 0 security issues
  
  # Performance Gates
  performance:
    required: true
    threshold: 2.0
    description: "Response time must be under 2 seconds"
    metrics:
      - api_response_time: < 2.0s
      - test_execution_time: < 30.0s
      - memory_usage: < 512MB
  
  # Security Gates
  security:
    required: true
    threshold: 0
    description: "Zero security vulnerabilities allowed"
    scans:
      - bandit: 0 high/critical issues
      - safety: 0 known vulnerabilities
      - detect_secrets: 0 secrets in code
  
  # Integration Gates
  integration:
    required: true
    threshold: 100.0
    description: "100% integration test coverage required"
    coverage:
      - unit_tests: 100%
      - integration_tests: 100%
      - end_to_end_tests: 100%
  
  # Documentation Gates
  documentation:
    required: true
    threshold: 100.0
    description: "Complete documentation coverage required"
    requirements:
      - api_documentation: 100%
      - deployment_guides: 100%
      - troubleshooting_guides: 100%
      - architecture_diagrams: 100%

# Deployment Process Gates
deployment_gates:
  # Pre-Deployment Validation
  pre_deployment:
    - quality_gates_passed: true
    - security_scan_complete: true
    - performance_benchmarks_met: true
    - integration_tests_passed: true
  
  # Deployment Approval
  approval:
    - code_review_complete: true
    - architecture_review_complete: true
    - security_review_complete: true
    - performance_review_complete: true
    - final_approval_granted: true
  
  # Post-Deployment Validation
  post_deployment:
    - health_check_passed: true
    - performance_monitoring_active: true
    - error_rate_monitoring_active: true
    - user_acceptance_testing_passed: true

# Rollback Triggers
rollback_triggers:
  - error_rate > 5%
  - response_time > 5s
  - memory_usage > 1GB
  - cpu_usage > 80%
  - failed_health_checks > 3

# Monitoring Requirements
monitoring:
  metrics:
    - response_time
    - error_rate
    - throughput
    - resource_usage
    - quality_metrics
  
  alerts:
    - critical_errors: immediate
    - performance_degradation: 5 minutes
    - quality_gate_failures: 1 minute
    - security_issues: immediate

# Quality Metrics Collection
quality_metrics:
  collection_interval: 60s
  retention_period: 30 days
  alerting:
    - meta_testing_failure: immediate
    - quality_gate_failure: immediate
    - performance_degradation: 5 minutes
