---
# Kiro Agent Deployment for GKE
# Deploys Kiro's Beast Mode Framework as a coordinated agent
apiVersion: v1
kind: Namespace
metadata:
  name: kiro-agents
  labels:
    name: kiro-agents
    purpose: beast-mode-framework
    hackathon: kiro-ai-development

---
# ConfigMap for Kiro Agent Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kiro-agent-config
  namespace: kiro-agents
data:
  # Beast Mode Framework Configuration
  BEAST_MODE_ENABLED: "true"
  PDCA_ORCHESTRATOR_ENABLED: "true"
  LANGGRAPH_PDCA_ENABLED: "true"
  MODEL_DRIVEN_BUILDING_ENABLED: "true"
  REFLECTIVE_MODULE_COMPLIANCE: "true"

  # Agent Coordination Configuration
  AGENT_COORDINATION_ENABLED: "true"
  MULTI_PERSPECTIVE_VALIDATION: "true"
  HEALTH_MONITORING_ENABLED: "true"

  # GKE Integration Configuration
  GKE_SERVICE_INTERFACE_ENABLED: "true"
  SERVICE_RESPONSE_TIME_TARGET_MS: "500"
  INTEGRATION_TIME_TARGET_MINUTES: "5"

  # Performance Configuration
  MAX_CONCURRENT_MEASUREMENTS: "1000"
  METRICS_COLLECTION_INTERVAL: "30"
  HEALTH_CHECK_INTERVAL: "10"

  # LangChain Configuration
  LANGCHAIN_ENABLED: "true"
  LANGGRAPH_ENABLED: "true"
  LOCAL_LLM_ENABLED: "true"
  OLLAMA_BASE_URL: "http://localhost:11434"
  DEFAULT_LLM_MODEL: "llama2"
  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  ENABLE_STRUCTURED_LOGGING: "true"

---
# Secret for Kiro Agent Authentication
apiVersion: v1
kind: Secret
metadata:
  name: kiro-agent-secrets
  namespace: kiro-agents
type: Opaque
data:
  # Base64 encoded secrets (replace with actual values)
  API_KEY: a2lyby1hZ2VudC1hcGkta2V5  # kiro-agent-api-key
  GITHUB_TOKEN: Z2hwX3Rva2VuX3BsYWNlaG9sZGVy  # gh_token_placeholder
  GCP_CREDENTIALS: Z2NwX2NyZWRlbnRpYWxzX3BsYWNlaG9sZGVy  # gcp_creds

---
# Service Account for Kiro Agent
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kiro-agent-sa
  namespace: kiro-agents
  annotations:
    iam.gke.io/gcp-service-account: >-
      kiro-agent@aardvark-linkedin-grepper.iam.gserviceaccount.com

---
# ClusterRole for Kiro Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kiro-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# ClusterRoleBinding for Kiro Agent
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kiro-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kiro-agent-role
subjects:
  - kind: ServiceAccount
    name: kiro-agent-sa
    namespace: kiro-agents

---
# Deployment for Kiro Agent
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kiro-agent
  namespace: kiro-agents
  labels:
    app: kiro-agent
    component: beast-mode-framework
    hackathon: kiro-ai-development
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kiro-agent
  template:
    metadata:
      labels:
        app: kiro-agent
        component: beast-mode-framework
        hackathon: kiro-ai-development
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kiro-agent-sa
      # Anti-affinity to spread pods across nodes for preemption resilience
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - kiro-agent
                topologyKey: kubernetes.io/hostname
      # Tolerations for preemptible nodes
      tolerations:
        - key: cloud.google.com/gke-preemptible
          operator: Exists
          effect: NoSchedule
      # Node selector for preemptible nodes
      nodeSelector:
        cloud.google.com/gke-preemptible: "true"
      containers:
        - name: kiro-agent
          image: gcr.io/aardvark-linkedin-grepper/kiro-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: kiro-agent-config
            - secretRef:
                name: kiro-agent-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: beast-mode-data
              mountPath: /app/data
      volumes:
        - name: tmp
          emptyDir: {}
        - name: beast-mode-data
          emptyDir:
            sizeLimit: 1Gi
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
# Service for Kiro Agent
apiVersion: v1
kind: Service
metadata:
  name: kiro-agent-service
  namespace: kiro-agents
  labels:
    app: kiro-agent
    component: beast-mode-framework
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: kiro-agent

---
# HorizontalPodAutoscaler for Kiro Agent
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kiro-agent-hpa
  namespace: kiro-agents
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kiro-agent
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

---
# NetworkPolicy for Kiro Agent
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kiro-agent-netpol
  namespace: kiro-agents
spec:
  podSelector:
    matchLabels:
      app: kiro-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: kiro-agents
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 53
    - protocol: UDP
      port: 53

---
# PodDisruptionBudget for Kiro Agent
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kiro-agent-pdb
  namespace: kiro-agents
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kiro-agent
