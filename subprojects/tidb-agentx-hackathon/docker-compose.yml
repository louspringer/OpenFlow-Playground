# 🚀 TiDB AgentX Hackathon - Docker Compose Configuration
# Complete development environment with OpenFlow tools integration

version: '3.8'

services:
  # Main TiDB Hackathon application
  tidb-hackathon:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tidb-hackathon-dev
    ports:
      - "8501:8501"  # Streamlit
      - "8000:8000"  # API (if needed)
      - "5432:5432"  # Database (if local)
    volumes:
      - .:/app
      - ../../generated_packages:/app/generated_packages
      - ./venv:/app/venv
      - ~/.cache/pip:/root/.cache/pip
    environment:
      - PYTHONPATH=/app:/app/src
      - TIDB_HOST=${TIDB_HOST:-localhost}
      - TIDB_PORT=${TIDB_PORT:-4000}
      - TIDB_USER=${TIDB_USER:-root}
      - TIDB_PASSWORD=${TIDB_PASSWORD:-}
      - TIDB_DATABASE=${TIDB_DATABASE:-hackathon}
      - OPENFLOW_ROOT=/app
      - ENVIRONMENT=development
    networks:
      - tidb-network
    depends_on:
      - tidb-serverless
    restart: unless-stopped
    command: ["uv", "run", "streamlit", "run", "src/streamlit/app.py", "--server.port=8501", "--server.address=0.0.0.0"]

  # TiDB Serverless connection (mock for development)
  tidb-serverless:
    image: pingcap/tidb:latest
    container_name: tidb-serverless-dev
    ports:
      - "4000:4000"
      - "10080:10080"
    environment:
      - TZ=UTC
    volumes:
      - tidb-data:/var/lib/tidb
      - ./scripts/init_tidb.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["tidb-server", "--config=/etc/tidb/tidb.toml"]

  # Redis for caching and session management
  redis:
    image: redis:7-alpine
    container_name: tidb-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]

  # MinIO for object storage (vector embeddings, models)
  minio:
    image: minio/minio:latest
    container_name: tidb-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password123}
    volumes:
      - minio-data:/data
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]

  # PostgreSQL for metadata (optional, can use TiDB instead)
  postgres:
    image: postgres:15-alpine
    container_name: tidb-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hackathon_meta}
      - POSTGRES_USER=${POSTGRES_USER:-hackathon}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-hackathon123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - tidb-network
    restart: unless-stopped

  # Jupyter Lab for AI development and experimentation
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tidb-jupyter
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ../../generated_packages:/app/generated_packages
      - ./notebooks:/app/notebooks
      - ~/.cache/pip:/root/.cache/pip
    environment:
      - PYTHONPATH=/app:/app/src
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-hackathon2025}
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["uv", "run", "jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=${JUPYTER_TOKEN:-hackathon2025}"]

  # Monitoring and observability
  prometheus:
    image: prom/prometheus:latest
    container_name: tidb-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.path=/prometheus", "--web.console.libraries=/etc/prometheus/console_libraries", "--web.console.templates=/etc/prometheus/consoles", "--storage.tsdb.retention.time=200h", "--web.enable-lifecycle"]

  grafana:
    image: grafana/grafana:latest
    container_name: tidb-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - tidb-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # OpenFlow Tools Development Environment
  openflow-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: openflow-dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - ../../generated_packages:/app/generated_packages
      - ../../src:/app/openflow-src
      - ~/.cache/pip:/root/.cache/pip
    environment:
      - PYTHONPATH=/app:/app/src:/app/openflow-src
      - OPENFLOW_ROOT=/app
      - ENVIRONMENT=development
    networks:
      - tidb-network
    restart: unless-stopped
    command: ["uv", "run", "python", "-m", "ghostbusters.cli", "serve", "--host=0.0.0.0", "--port=8080"]

  # Testing and CI environment
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: testing
    container_name: tidb-test-runner
    volumes:
      - .:/app
      - ../../generated_packages:/app/generated_packages
      - ./test-results:/app/test-results
    environment:
      - PYTHONPATH=/app:/app/src
      - OPENFLOW_ROOT=/app
      - TEST_ENVIRONMENT=docker
    networks:
      - tidb-network
    restart: "no"
    command: ["uv", "run", "pytest", "tests/", "-v", "--cov=src", "--cov-report=html", "--cov-report=xml", "--junitxml=test-results/junit.xml"]

volumes:
  tidb-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  postgres-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  tidb-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Health checks and dependencies
x-healthcheck: &healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# Environment file
# Copy .env.example to .env and fill in your values
# TIDB_HOST=your-tidb-serverless-host
# TIDB_USER=your-tidb-username
# TIDB_PASSWORD=your-tidb-password
# TIDB_DATABASE=your-database-name
# MINIO_ROOT_USER=your-minio-username
# MINIO_ROOT_PASSWORD=your-minio-password
# JUPYTER_TOKEN=your-jupyter-token
# GRAFANA_PASSWORD=your-grafana-password







