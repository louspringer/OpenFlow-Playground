# .pre-commit-config.yaml
# Comprehensive pre-commit configuration for round-trip engineering enforcement

repos:
  # Black (Code formatting)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        args: [--line-length=88]
        exclude: |
          (?x)^(
              \.cursor/.*\.backup[0-9]+\.py$|
              data/cost_analysis\.py$|
              scripts/.*\.backup[0-9]+\.py$|
              scripts/mdc-linter\.py\.backup[0-9]+$|
              scripts/mdc-linter\.py\.working$
          )$

  # Ruff (Fast Python linter) - practical configuration
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.6
    hooks:
      - id: ruff
        args: [--fix]

  # Round-Trip Engineering Enforcement
  - repo: local
    hooks:
      - id: round-trip-enforcement
        name: Round-Trip Engineering Enforcement
        entry: python scripts/enforce_round_trip.py
        language: system
        pass_filenames: true
        types: [python]
        stages: [pre-commit]
        description: "Enforce round-trip engineering: all Python files must survive reverse engineering and regeneration"
        args: [--pre-commit]

      - id: model-conformance-check
        name: Model Conformance Check
        entry: python scripts/check_model_conformance.py
        language: system
        pass_filenames: true
        types: [python]
        stages: [pre-commit]
        description: "Check that all Python files conform to their extracted models"
        args: [--pre-commit]

      - id: functional-equivalence-test
        name: Functional Equivalence Test
        entry: python scripts/test_functional_equivalence.py
        language: system
        pass_filenames: true
        types: [python]
        stages: [pre-commit]
        description: "Test that regenerated code is functionally equivalent to original"
        args: [--pre-commit]

  # Project Model Validation
  - repo: local
    hooks:
      - id: project-model-validation
        name: Project Model Validation
        entry: python scripts/validate_project_model.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # Security Scanning
  - repo: local
    hooks:
      - id: security-scan
        name: Security Scan
        entry: uv run python scripts/bandit_integration.py --project --report
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        description: "Run security scanning with Bandit"

  # Code Quality Enforcement
  - repo: local
    hooks:
      - id: code-quality-check
        name: Code Quality Check
        entry: python scripts/check_code_quality.py
        language: system
        pass_filenames: true
        types: [python]
        stages: [pre-commit]
        description: "Enforce code quality standards and prevent direct editing violations"
        args: [--pre-commit]

