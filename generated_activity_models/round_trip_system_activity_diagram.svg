<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #333; }
      .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #666; }
      .activity { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; rx: 8; }
      .decision { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; rx: 8; }
      .start-end { fill: #e8f5e8; stroke: #388e3c; stroke-width: 2; rx: 20; }
      .text { font-family: Arial, sans-serif; font-size: 12px; fill: #333; }
      .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
      .decision-text { font-family: Arial, sans-serif; font-size: 11px; fill: #f57c00; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" class="title">Python Module Activity Flow</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Classes: 1, Functions: 8</text>

  <ellipse cx="80" cy="100" rx="30" ry="20" class="start-end" />
  <text x="80" y="105" text-anchor="middle" class="text">Start</text>
  <rect x="50" y="150" width="200" height="40" class="activity" />
  <text x="150" y="175" text-anchor="middle" class="text">__init__</text>
  <line x1="80" y1="120" x2="150" y2="150" class="arrow" />
  <rect x="50" y="210" width="200" height="40" class="activity" />
  <text x="150" y="235" text-anchor="middle" class="text">generate_code_from_extracted_model</text>
  <line x1="150" y1="200" x2="150" y2="210" class="arrow" />
  <rect x="50" y="270" width="200" height="40" class="activity" />
  <text x="150" y="295" text-anchor="middle" class="text">create_model_from_design</text>
  <line x1="150" y1="260" x2="150" y2="270" class="arrow" />
  <rect x="50" y="330" width="200" height="40" class="activity" />
  <text x="150" y="355" text-anchor="middle" class="text">save_model</text>
  <line x1="150" y1="320" x2="150" y2="330" class="arrow" />
  <rect x="50" y="390" width="200" height="40" class="activity" />
  <text x="150" y="415" text-anchor="middle" class="text">load_model</text>
  <line x1="150" y1="380" x2="150" y2="390" class="arrow" />
  <ellipse cx="150" cy="450" rx="30" ry="20" class="start-end" />
  <text x="150" y="455" text-anchor="middle" class="text">End</text>
  <line x1="150" y1="430" x2="150" y2="450" class="arrow" />
  <rect x="350" y="200" width="150" height="60" class="decision" />
  <text x="425" y="220" text-anchor="middle" class="decision-text">Decision</text>
  <text x="425" y="240" text-anchor="middle" class="text">Logic Check</text>
  <text x="50" y="280" class="subtitle">Standalone Functions</text>
  <rect x="50" y="300" width="200" height="40" class="activity" />
  <text x="150" y="325" text-anchor="middle" class="text">Process Functions</text>
</svg>