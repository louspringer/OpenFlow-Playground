name: Cloud Build CI/CD

on:
  push:
    branches: [ main, develop, staging ]
  pull_request:
    branches: [ main, develop, staging ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        
    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: gen-lang-client-0128452200
        
    - name: Trigger Cloud Build
      run: |
        set -euo pipefail
        echo "🚀 Triggering Cloud Build pipeline"
        BUILD_ID=$(gcloud builds submit \
          --config=cloudbuild.yaml \
          --project=gen-lang-client-0128452200 \
          . \
          --async \
          --format='value(id)')
        echo "Started build: $BUILD_ID"
        echo "Build URL: https://console.cloud.google.com/cloud-build/builds/${BUILD_ID}?project=gen-lang-client-0128452200"
        
        # Poll build status (timeout ~15 minutes)
        echo "Polling build status..."
        for i in $(seq 1 90); do
          STATUS=$(gcloud builds describe "$BUILD_ID" --project=gen-lang-client-0128452200 --format='value(status)')
          echo "[$(date +%T)] Build $BUILD_ID status: $STATUS"
          
          case "$STATUS" in
            SUCCESS)
              echo "✅ Build succeeded!"
              exit 0
              ;;
            FAILURE|CANCELLED|TIMEOUT)
              echo "❌ Build failed with status: $STATUS"
              echo "Fetching build logs..."
              gcloud builds log "$BUILD_ID" --project=gen-lang-client-0128452200 || true
              exit 1
              ;;
            WORKING|QUEUED|PENDING)
              # Build still in progress
              ;;
            *)
              echo "Unknown status: $STATUS"
              ;;
          esac
          
          sleep 10
        done
        
        echo "⏱️ Timed out waiting for build $BUILD_ID"
        gcloud builds log "$BUILD_ID" --project=gen-lang-client-0128452200 || true
        exit 1
          
    - name: Check deployment status
      run: |
        echo "🔍 Checking deployment status..."
        sleep 30
        curl -f https://ghostbusters-api-container-1077539189076.us-central1.run.app/health || echo "Service not ready yet" 