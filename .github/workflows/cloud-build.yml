name: Cloud Build CI/CD

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop, staging]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Notify Observatory - cloud-build Started
      if: always()
      run: "curl -X POST https://observatory.nkllon.com/api/events -H \"Authorization:
        Bearer ${{ secrets.OBSERVATORY_TOKEN }}\" -H \"Content-Type: application/json\"\
        \ -d '{\"event_type\": \"ci_workflow_started\", \"source\": \"github-actions\"\
        , \"data\": {\"workflow\": \"cloud-build\", \"repository\": \"${{ github.repository
        }}\", \"pr_number\": \"${{ github.event.number }}\", \"commit_sha\": \"${{
        github.sha }}\"}}' || echo \"Observatory notification failed (non-blocking)\"\
        \n"
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Setup Google Cloud CLI
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: aardvark-linkedin-grepper

    - name: Trigger Cloud Build
      run: |
        echo "🚀 Triggering Cloud Build pipeline"
        gcloud builds submit \
          --config=cloudbuild.yaml \
          --project=aardvark-linkedin-grepper \
          .
          
    - name: Check deployment status
      run: |-
        echo "🔍 Checking deployment status..."
        sleep 30
        curl -f https://ghostbusters-api-container-1077539189076.us-central1.run.app/health || echo "Service not ready yet" 
    - name: Notify Observatory - cloud-build Completed
      if: always()
      run: "curl -X POST https://observatory.nkllon.com/api/events -H \"Authorization:
        Bearer ${{ secrets.OBSERVATORY_TOKEN }}\" -H \"Content-Type: application/json\"\
        \ -d '{\"event_type\": \"ci_workflow_completed\", \"source\": \"github-actions\"\
        , \"data\": {\"workflow\": \"cloud-build\", \"repository\": \"${{ github.repository
        }}\", \"pr_number\": \"${{ github.event.number }}\", \"status\": \"${{ job.status
        }}\", \"run_id\": \"${{ github.run_id }}\"}}' || echo \"Observatory notification
        failed (non-blocking)\"\n"
